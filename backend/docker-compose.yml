services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: web
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: node
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "5173:5173"   # ✅ STANDARD PORT (no confusion)
    command: sh -c "npm install && npm run dev"

  db:
    image: mysql:8
    container_name: db
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: